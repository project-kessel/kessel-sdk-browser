name: CI/CD

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Check lockfile sync
        if: github.event_name == 'pull_request'
        run: |
          npm install --package-lock-only
          if git diff --exit-code package-lock.json; then
            echo "package-lock.json is in sync"
          else
            echo "::error::package-lock.json is out of sync with package.json. Run 'npm install' and commit the updated lockfile."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npx nx run-many -t lint

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Run integration tests - Empty Array Handling
        run: npx jest --config=packages/react-kessel-access-check/jest.config.integration.js empty-array-handling.test.tsx --coverage

      - name: Run integration tests - Reporter Validation
        run: npx jest --config=packages/react-kessel-access-check/jest.config.integration.js reporter-validation.test.tsx --coverage

      - name: Run integration tests - Component Lifecycle
        run: npx jest --config=packages/react-kessel-access-check/jest.config.integration.js component-lifecycle.test.tsx --coverage

      - name: Run integration tests - HTTP Errors
        run: npx jest --config=packages/react-kessel-access-check/jest.config.integration.js http-errors.test.tsx --coverage

      - name: Run integration tests - Response Parsing
        run: npx jest --config=packages/react-kessel-access-check/jest.config.integration.js response-parsing.test.tsx --coverage

      - name: Run integration tests - Security XSS
        run: npx jest --config=packages/react-kessel-access-check/jest.config.integration.js security-xss.test.tsx --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

      - name: Build packages
        run: npx nx run-many -t build

      - name: Verify build artifacts
        run: |
          echo "Verifying build artifacts..."
          if [ ! -d "dist/packages/react-kessel-access-check" ]; then
            echo "Build failed: dist/packages/react-kessel-access-check directory not found"
            exit 1
          fi
          if [ ! -f "dist/packages/react-kessel-access-check/index.js" ]; then
            echo "Build failed: dist/packages/react-kessel-access-check/index.js not found"
            exit 1
          fi
          if [ ! -f "dist/packages/react-kessel-access-check/index.d.ts" ]; then
            echo "Build failed: dist/packages/react-kessel-access-check/index.d.ts not found"
            exit 1
          fi
          echo "Build artifacts verified successfully"

      - name: Verify example app builds
        run: |
          if [ ! -d "packages/demo-react-kessel-access-check/dist" ]; then
            echo "Example app build failed: dist directory not found"
            exit 1
          fi

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  release:
    runs-on: ubuntu-latest
    needs: [ci]
    # Only run on push to master branch (never on workflow_dispatch, etc.)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: npm-publish
    permissions:
      contents: write    # Needed for creating tags and GitHub releases
      issues: write      # Needed for release notes
      pull-requests: write  # Needed for release notes
      id-token: write    # Needed for OIDC token generation (npm trusted publishing)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_BOT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Release
        uses: ./.github/actions/release
        with:
          gh_token: ${{ secrets.GH_BOT_TOKEN }}
          gh_name: ${{ secrets.GH_NAME }}
          gh_email: ${{ secrets.GH_EMAIL }}
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
