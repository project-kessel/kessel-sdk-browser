name: Release job
description: Version and publish packages using NX release
inputs:
  gh_token:
    description: 'Github token'
    required: true
  gh_name:
    description: 'Github name'
    required: true
  gh_email:
    description: 'Github email'
    required: true
  gpg_private_key:
    description: 'GPG private key for signing commits (passphrase-less)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Import GPG key
      shell: bash
      run: |
        echo "${{ inputs.gpg_private_key }}" | base64 -d | gpg --batch --import

    - name: Configure git
      shell: bash
      run: |
        git config user.name "${{ inputs.gh_name }}"
        git config user.email "${{ inputs.gh_email }}"
        git config commit.gpgsign true
        git config tag.gpgsign true
        git config user.signingkey $(gpg --list-secret-keys --with-colons "${{ inputs.gh_email }}" | awk -F: '/^sec:/ {print $5; exit}')

    - name: Verify version alignment
      shell: bash
      run: ./.github/scripts/verify-versions.sh

    - name: Run NX release (version and changelog)
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        GITHUB_TOKEN: ${{ inputs.gh_token }}
      run: npx nx release --skip-publish --verbose

    - name: Rebuild packages with new versions
      shell: bash
      run: npx nx run-many -t build --skipNxCache

    - name: Push changes and tags
      shell: bash
      env:
        HUSKY: '0'
      run: git push --follow-tags

    - name: Verify built files
      shell: bash
      run: |
        echo "Verifying built files..."
        ls -la dist/packages/*/index.js || (echo "Built files missing!" && exit 1)
        echo "Checking package.json files in dist..."
        for pkg in dist/packages/*/package.json; do
          echo "=== $pkg ==="
          cat "$pkg" | grep -E '"name"|"main"|"types"'
        done

    - name: Run NX release publish
      shell: bash
      env:
        NPM_CONFIG_PROVENANCE: true
        NPM_CONFIG_LEGACY_PEER_DEPS: false
      run: npx nx release publish

    - name: Tag last-release
      shell: bash
      run: |
        git tag -f -m "last-release" last-release
        git push origin last-release --force
        git push origin --tags
